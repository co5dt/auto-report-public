# Quality Report CLI configuration
# Values can be overridden by environment variables (see README.md).

# Number of deliberation agents (1..3). Override with CONSENSUS_AGENT_COUNT env var.
# Code default: 3. Uncomment the line below to override.
# consensus.agent.count=3

# Enable tool-aware deliberation loop. Override with TOOL_LOOP_ENABLED env var.
# When enabled, agents can request to read changed files during deliberation.
tool.loop.enabled=false

# Evidence-first pipeline: deterministic fact extraction before narrative generation.
# Override with EVIDENCE_FIRST_ENABLED env var.
evidence.first.enabled=true

# Narrative verification: deterministic post-generation check for must-mention identifiers.
# Override with NARRATIVE_VERIFY_ENABLED env var.
narrative.verify.enabled=true

# Max repair retries when narrative verification fails (0..3).
# Override with NARRATIVE_REPAIR_MAX_RETRIES env var.
narrative.repair.max-retries=1

# Emit debug artifacts (evidence.json, draft.json, verification.json) during generation.
# Override with NARRATIVE_DEBUG_ARTIFACTS_ENABLED env var.
narrative.debug.artifacts.enabled=false

# Optional filesystem path to override the built-in domain-keywords JSON (src/main/resources/domain-keywords.json).
# By default the classpath resource is used. Set this only when you need a custom dictionary at runtime.
# Override with DOMAIN_KEYWORDS_PATH env var.
# domain.keywords.path=/path/to/custom-domain-keywords.json

# Automatically copy report-e2e artifacts into e2e-results/<datetime>/ after each run.
# Override with E2E_RESULTS_PERSIST env var.
e2e.results.persist=true
